name: First interaction greeting

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  greeting:
    runs-on: ubuntu-latest
    steps:
      - name: Greet first-time contributors
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: >-
            Thanks for opening this issue! If you'd like to work on fixing it,
            comment below and we'll assign it to you. Don't forget to star and
            fork the repo to help support the project.
          pr-message: >-
            Thanks for your pull request and for contributing to VetGraph. We
            appreciate your help. Please consider starring and forking the repo
            to support the project and help others find it.
