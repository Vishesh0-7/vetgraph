name: Assign issue on request

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  assign-on-comment:
    if: ${{ !github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    steps:
      - name: Assign commenter when requested
        uses: actions/github-script@v7
        with:
          script: |
            const body = (context.payload.comment.body || "").toLowerCase();
            const requested = /(assign me|i'?d like to work on this|i would like to work on this|can i work on this)/i.test(body);

            if (!requested) {
              core.info("No assignment phrase detected.");
              return;
            }

            const issue_number = context.payload.issue.number;
            const username = context.payload.comment.user.login;

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              assignees: [username],
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: `Assigned @${username}. Thanks for volunteering to work on this issue! Please consider starring and forking the repository to support VetGraph and help increase visibility.`,
            });
